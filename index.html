<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文單字遊戲</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100vh; color: #f8fafc; display: grid; place-items: center;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(250,204,21,.22), transparent 24rem),
        radial-gradient(circle at 86% 18%, rgba(45,212,191,.2), transparent 26rem),
        linear-gradient(145deg, #182034 0%, #111827 48%, #171717 100%);
    }
    main { width: min(560px, calc(100% - 32px)); text-align: center; padding: 40px 0; }
    h1 { margin: 0 0 14px; font-size: clamp(30px, 6vw, 52px); }
    p { margin: 0 0 10px; color: #cbd5e1; font-size: 17px; line-height: 1.7; }
    .hint { margin-top: 8px; color: #94a3b8; font-size: 14px; }
    code { color: #facc15; }
  </style>
</head>
<body>
  <main>
    <h1>🔒 老師專用</h1>
    <p>請輸入密碼進入學生總覽。</p>
    <form id="gate" autocomplete="off">
      <input id="pw" type="password" inputmode="numeric" placeholder="密碼" autofocus
        style="margin-top:18px;width:160px;text-align:center;font-size:22px;letter-spacing:4px;
        padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);
        background:rgba(2,6,23,.6);color:#f8fafc;">
    </form>
    <p id="err" class="hint" style="color:#fca5a5;visibility:hidden;">密碼錯誤</p>
  </main>
  <script>
    const form = document.getElementById('gate');
    const pw = document.getElementById('pw');
    const err = document.getElementById('err');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (pw.value === '1999') {
        sessionStorage.setItem('admin_ok', '1');
        location.href = 'admin.html';
      } else {
        err.style.visibility = 'visible';
        pw.value = '';
        pw.focus();
      }
    });
  </script>
</body>
</html>
