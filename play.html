<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字冒險 - 文法擴充版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    <style>
        body {
            opacity: 0;
            transition: opacity 0.5s;
        }

        body.loaded {
            opacity: 1;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes gameShake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }

        .game-shake {
            animation: gameShake 0.35s ease;
        }

        @keyframes dmgFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-60px) scale(1.3);
                opacity: 0;
            }
        }

        .dmg-float {
            animation: dmgFloat 0.9s ease-out forwards;
            pointer-events: none;
        }

        @keyframes comboGrow {
            0% {
                transform: scale(0.8);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .combo-grow {
            animation: comboGrow 0.3s ease-out forwards;
        }

        @keyframes bossShake {

            0%,
            100% {
                transform: translateX(0) rotate(0deg);
            }

            25% {
                transform: translateX(-5px) rotate(-3deg);
            }

            75% {
                transform: translateX(5px) rotate(3deg);
            }
        }

        .boss-shake {
            animation: bossShake 0.35s ease;
        }
    </style>
</head>

<body class="bg-sky-50">
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import ReactDOM from 'react-dom/client';
        import {
            BookOpen, Gamepad2, LayoutList, Layers, Volume2, ChevronLeft, ChevronRight,
            CheckCircle, XCircle, Trophy, Star, Sparkles, HelpCircle, RefreshCw, Library,
            Puzzle, Lightbulb, Music, Map, Wand2, Flag, AlertCircle, ArrowDownLeft,
            Shuffle, GraduationCap, PenTool, Coffee, Keyboard, MousePointerClick, Filter, Eye, Timer, Home, Info,
            FileText, X, Swords, Zap, ExternalLink
        } from 'lucide-react';

        // --- 語音與音效合成優化 ---
        let availableVoices = [];
        const loadVoices = () => { if (!window.speechSynthesis) return; const voices = window.speechSynthesis.getVoices(); if (voices.length > 0) availableVoices = voices; };
        loadVoices();
        if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;

        const speakText = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            let selectedVoice = availableVoices.find(v => (v.lang === 'en-US' || v.lang === 'en_US') && !v.name.includes("Network"));
            if (!selectedVoice) selectedVoice = availableVoices.find(v => v.lang.includes('en'));
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.lang = 'en-US'; utterance.rate = 0.9; utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        };

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) { console.error("Audio play failed", e); }
        };

        const shuffleArray = (array) => { if (!array) return []; const newArray = [...array]; for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[newArray[i], newArray[j]] = [newArray[j], newArray[i]]; } return newArray; };

        // --- GameButton Component ---
        const GameButton = ({ children, onClick, color = "blue", className = "", disabled = false, active = false }) => {
            const colorStyles = { blue: "bg-sky-400 border-sky-600 text-white hover:bg-sky-300", green: "bg-emerald-400 border-emerald-600 text-white hover:bg-emerald-300", yellow: "bg-yellow-400 border-yellow-600 text-yellow-900 hover:bg-yellow-300", red: "bg-rose-400 border-rose-600 text-white hover:bg-rose-300", purple: "bg-violet-400 border-violet-600 text-white hover:bg-violet-300", orange: "bg-orange-400 border-orange-600 text-white hover:bg-orange-300", white: "bg-white border-slate-200 text-slate-700 hover:bg-slate-50", gray: "bg-slate-200 border-slate-400 text-slate-600 hover:bg-slate-300", active: "bg-yellow-400 border-yellow-600 text-yellow-900 ring-2 ring-yellow-200 ring-offset-2" };
            const finalColor = active ? colorStyles.active : (colorStyles[color] || colorStyles.blue);
            return (<button onClick={onClick} disabled={disabled} className={`${finalColor} border-b-4 active:border-b-0 active:translate-y-1 rounded-2xl px-4 py-2 font-black tracking-wide transition-all duration-100 shadow-md flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:border-b-4 disabled:active:translate-y-0 ${className}`}>{children}</button>);
        };

        // --- 元件 1: 單字學習模式 ---
        const StudyMode = ({ data }) => {
            const [mode, setMode] = useState('card');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            useEffect(() => { setCurrentIndex(0); setIsFlipped(false); }, [data]);
            if (!data || data.length === 0) return <div className="p-10 text-center text-slate-400 font-bold">目前沒有資料</div>;
            const currentWord = data[currentIndex];
            const handleNext = () => { setIsFlipped(false); setTimeout(() => setCurrentIndex((prev) => (prev + 1) % data.length), 200); };
            const handlePrev = () => { setIsFlipped(false); setTimeout(() => setCurrentIndex((prev) => (prev - 1 + data.length) % data.length), 200); };
            return (
                <div className="flex flex-col h-full animate-in fade-in">
                    <div className="flex justify-center mb-6 gap-3">
                        <GameButton onClick={() => setMode('card')} active={mode === 'card'} color="white" className="text-sm"><Layers className="w-4 h-4" /> 卡牌</GameButton>
                        <GameButton onClick={() => setMode('list')} active={mode === 'list'} color="white" className="text-sm"><LayoutList className="w-4 h-4" /> 列表</GameButton>
                    </div>
                    {mode === 'card' ? (
                        <div className="flex-1 flex flex-col items-center justify-start min-h-[400px]">
                            <div className="relative w-full max-w-sm h-80 cursor-pointer group perspective-1000 z-10" onClick={() => setIsFlipped(!isFlipped)} style={{ perspective: '1000px' }}>
                                <div className="relative w-full h-full transition-transform duration-500" style={{ transformStyle: 'preserve-3d', transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
                                    <div className="absolute inset-0 bg-white border-4 border-sky-400 rounded-3xl shadow-[0_8px_0_rgba(56,189,248,0.3)] flex flex-col items-center justify-center p-6" style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
                                        <div className="absolute top-4 right-6 bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full text-sm font-black border-2 border-yellow-600 shadow-sm rotate-3">{currentIndex + 1} / {data.length}</div>
                                        <h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-2 tracking-tight text-center break-words w-full drop-shadow-sm">{currentWord.word}</h2>
                                        <span className="text-white bg-sky-500 font-bold px-4 py-1.5 rounded-xl text-lg shadow-md border-b-4 border-sky-700 transform -rotate-2">{currentWord.part_of_speech}</span>
                                        <div className="mt-10 text-slate-400 text-xs font-bold flex items-center gap-1 animate-pulse bg-slate-100 px-3 py-1 rounded-full"><RefreshCw className="w-3 h-3" /> CLICK TO FLIP</div>
                                        <button onClick={(e) => { e.stopPropagation(); speakText(currentWord.word); }} className="absolute bottom-5 right-1/2 translate-x-1/2 p-3 bg-rose-400 text-white rounded-full border-b-4 border-rose-600 active:border-b-0 active:translate-y-1 transition-all shadow-md"><Volume2 className="w-6 h-6" /></button>
                                    </div>
                                    <div className="absolute inset-0 bg-violet-500 border-4 border-violet-700 text-white rounded-3xl shadow-[0_8px_0_rgba(109,40,217,0.3)] flex flex-col items-center justify-center p-8" style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}>
                                        <h3 className="text-2xl sm:text-3xl font-black mb-4 text-center leading-snug drop-shadow-md bg-white/20 px-4 py-2 rounded-xl backdrop-blur-sm border-2 border-white/30 transform -rotate-1">{currentWord.chinese}</h3>
                                        <div className="bg-black/20 p-4 rounded-xl border-2 border-white/10 w-full relative overflow-y-auto max-h-[140px]">
                                            <p className="text-white text-center italic text-sm sm:text-base leading-relaxed font-bold">"{currentWord.sentence}"</p>
                                            <p className="text-violet-200 text-center text-xs mt-2 font-medium">{currentWord.sentence_chinese}</p>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); speakText(currentWord.sentence); }} className="mt-4 p-3 bg-yellow-400 text-yellow-900 rounded-full border-b-4 border-yellow-600 active:border-b-0 active:translate-y-1 transition-all shadow-md"><Volume2 className="w-5 h-5" /></button>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8 w-full max-w-sm px-4">
                                <GameButton onClick={handlePrev} color="white" className="flex-1"><ChevronLeft className="w-6 h-6" /> 上一個</GameButton>
                                <GameButton onClick={handleNext} color="blue" className="flex-1 text-lg">下一個 <ChevronRight className="w-6 h-6" /></GameButton>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 overflow-y-auto max-h-[70vh] pr-1 space-y-3 pb-20">
                            {data.map((item) => (
                                <div key={item.id} className="bg-white p-4 rounded-2xl border-b-4 border-slate-200 flex items-center justify-between hover:translate-x-1 transition-all group">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-1"><span className="font-black text-lg text-slate-700 group-hover:text-sky-500 transition-colors">{item.word}</span><span className="text-xs text-white bg-slate-400 px-2 py-0.5 rounded-lg font-bold border-b-2 border-slate-600">{item.part_of_speech}</span></div>
                                        <div className="text-slate-500 text-sm font-bold">{item.chinese}</div>
                                    </div>
                                    <button onClick={() => speakText(item.word)} className="p-2 bg-sky-100 text-sky-500 rounded-xl hover:bg-sky-200 active:scale-95 transition-colors"><Volume2 className="w-5 h-5" /></button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- 元件 2.1: 拼字測驗 ---
        const SpellingQuiz = ({ data, onFinish }) => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [quizItems, setQuizItems] = useState([]);
            const [currentLetters, setCurrentLetters] = useState([]);
            const [poolLetters, setPoolLetters] = useState([]);
            const [feedback, setFeedback] = useState(null); // null | 'correct' | 'wrong' | 'no_score_hints' | 'no_score_solved' | 'no_score_errors'
            const [score, setScore] = useState(0);
            const [targetPattern, setTargetPattern] = useState([]);
            const [targetClean, setTargetClean] = useState([]);
            const [hintCount, setHintCount] = useState(0);       // 本題提示次數
            const [errorCount, setErrorCount] = useState(0);     // 本題答錯次數
            const [solvedByCheat, setSolvedByCheat] = useState(false); // 本題有無按「查看答案」
            const [scoreHistory, setScoreHistory] = useState([]); // 每題得分紀錄 {word, scored, reason}
            const scoreHistoryRef = useRef([]);  // 同步 ref 避免 setTimeout closure 問題
            const scoreRef = useRef(0);

            useEffect(() => {
                if (!data || data.length === 0) return;
                const shuffled = shuffleArray([...data]).slice(0, 10);
                setQuizItems(shuffled);
                setCurrentQIndex(0);
                setScore(0);
                scoreRef.current = 0;
                setScoreHistory([]);
                scoreHistoryRef.current = [];
                if (shuffled.length > 0) loadQuestion(shuffled[0]);
            }, [data]);

            const loadQuestion = (item) => {
                if (!item) return;
                const rawWord = item.word.toLowerCase();
                setTargetPattern(rawWord.split(''));
                const cleanChars = rawWord.replace(/[^a-z]/g, '').split('');
                setTargetClean(cleanChars);
                const scrambled = cleanChars.map((char, idx) => ({ char, id: idx, key: `${char}-${idx}-${Math.random()}` }));
                setPoolLetters(shuffleArray([...scrambled]));
                setCurrentLetters([]);
                setFeedback(null);
                setHintCount(0);
                setErrorCount(0);
                setSolvedByCheat(false);
                speakText(item.word);
            };

            const handlePoolClick = (l) => {
                if (feedback === 'correct' || feedback === 'no_score_hints' || feedback === 'no_score_solved' || feedback === 'no_score_errors') return;
                setPoolLetters(prev => prev.filter(p => p.key !== l.key));
                setCurrentLetters(prev => [...prev, l]);
            };
            const handleAnswerClick = (l) => {
                if (feedback === 'correct' || feedback === 'no_score_hints' || feedback === 'no_score_solved' || feedback === 'no_score_errors') return;
                setCurrentLetters(prev => prev.filter(p => p.key !== l.key));
                setPoolLetters(prev => [...prev, l]);
            };
            const handleHint = () => {
                if (feedback === 'correct' || feedback === 'no_score_hints' || feedback === 'no_score_solved' || feedback === 'no_score_errors') return;
                let firstWrongIndex = -1;
                for (let i = 0; i < currentLetters.length; i++) {
                    if (currentLetters[i].char !== targetClean[i]) {
                        firstWrongIndex = i;
                        break;
                    }
                }
                if (firstWrongIndex === -1) firstWrongIndex = currentLetters.length;
                if (firstWrongIndex >= targetClean.length) return;
                
                const neededChar = targetClean[firstWrongIndex];
                const correctPrefix = currentLetters.slice(0, firstWrongIndex);
                const wronglyPlaced = currentLetters.slice(firstWrongIndex);
                const allAvailable = [...poolLetters, ...wronglyPlaced];
                
                const candidateIndex = allAvailable.findIndex(l => l.char === neededChar);
                if (candidateIndex !== -1) {
                    setHintCount(prev => prev + 1);
                    const candidate = allAvailable[candidateIndex];
                    allAvailable.splice(candidateIndex, 1);
                    setCurrentLetters([...correctPrefix, candidate]);
                    setPoolLetters(allAvailable);
                }
            };
            const handleSolve = () => {
                if (feedback === 'correct' || feedback === 'no_score_hints' || feedback === 'no_score_solved' || feedback === 'no_score_errors') return;
                let tempPool = [...poolLetters, ...currentLetters];
                const solution = [];
                const remainingPool = [...tempPool];
                for (const char of targetClean) {
                    const foundIndex = remainingPool.findIndex(l => l.char === char);
                    if (foundIndex !== -1) { solution.push(remainingPool[foundIndex]); remainingPool.splice(foundIndex, 1); }
                }
                setCurrentLetters(solution);
                setPoolLetters(remainingPool);
                setSolvedByCheat(true);
                setFeedback('no_score_solved');
            };

            const isFrozen = (fb) => ['correct', 'no_score_hints', 'no_score_solved', 'no_score_errors'].includes(fb);

            const checkAnswer = () => {
                if (isFrozen(feedback)) return;
                const currentItem = quizItems[currentQIndex];
                if (!currentItem) return;
                const targetWord = currentItem.word.toLowerCase().replace(/[^a-z]/g, '');
                const userWord = currentLetters.map(l => l.char).join('');
                if (userWord === targetWord) {
                    speakText("Correct! " + currentItem.word);
                    // 判斷能否得分
                    if (solvedByCheat) {
                        const newHist = [...scoreHistoryRef.current, { word: currentItem.word, scored: false, reason: 'solved' }];
                        scoreHistoryRef.current = newHist;
                        setScoreHistory(newHist);
                        setFeedback('no_score_solved');
                        setTimeout(handleNext, 2000);
                    } else if (hintCount > 2) {
                        const newHist = [...scoreHistoryRef.current, { word: currentItem.word, scored: false, reason: 'hints' }];
                        scoreHistoryRef.current = newHist;
                        setScoreHistory(newHist);
                        setFeedback('no_score_hints');
                        setTimeout(handleNext, 2000);
                    } else if (errorCount >= 3) {
                        const newHist = [...scoreHistoryRef.current, { word: currentItem.word, scored: false, reason: 'errors' }];
                        scoreHistoryRef.current = newHist;
                        setScoreHistory(newHist);
                        setFeedback('no_score_errors');
                        setTimeout(handleNext, 2000);
                    } else {
                        const newHist = [...scoreHistoryRef.current, { word: currentItem.word, scored: true, reason: 'ok' }];
                        scoreHistoryRef.current = newHist;
                        const currentCorrect = newHist.filter(h => h.scored).length;
                        scoreRef.current = Math.round((currentCorrect / quizItems.length) * 100);
                        setScore(scoreRef.current);
                        setScoreHistory(newHist);
                        setFeedback('correct');
                        setTimeout(handleNext, 1500);
                    }
                } else {
                    const newErrorCount = errorCount + 1;
                    setErrorCount(newErrorCount);
                    if (newErrorCount >= 3) {
                        setFeedback('wrong');
                        speakText("Try again");
                        setTimeout(() => setFeedback(null), 1000);
                    } else {
                        setFeedback('wrong');
                        speakText("Try again");
                        setTimeout(() => setFeedback(null), 1000);
                    }
                }
            };

            const handleNext = () => {
                if (currentQIndex < quizItems.length - 1) {
                    const nextIndex = currentQIndex + 1;
                    setCurrentQIndex(nextIndex);
                    loadQuestion(quizItems[nextIndex]);
                } else {
                    onFinish(scoreRef.current, scoreHistoryRef.current);
                }
            };

            if (!quizItems || quizItems.length === 0) return <div className="p-10 text-center text-slate-400 font-bold">載入中或無資料...</div>;
            const currentItem = quizItems[currentQIndex]; if (!currentItem) return null; let letterIndex = 0;

            // 計算按鈕顏色與底部訊息
            const frozen = isFrozen(feedback);
            let checkBtnColor = 'blue';
            if (feedback === 'correct') checkBtnColor = 'green';
            else if (feedback === 'wrong') checkBtnColor = 'red';
            else if (feedback === 'no_score_hints' || feedback === 'no_score_solved' || feedback === 'no_score_errors') checkBtnColor = 'gray';

            // 提示警示狀態
            const hintWarning = hintCount === 2; // 已用2次，下一次會失分
            const errorWarning = errorCount === 2; // 已錯2次，下一次會失分

            return (
                <div className="flex flex-col items-center">
                    <div className="w-full flex justify-between items-center mb-4 px-2">
                        <span className="text-xs font-black text-slate-400">SPELLING {currentQIndex + 1} / {quizItems.length}</span>
                        <span className="text-xs font-black text-yellow-600 bg-yellow-100 px-2 py-1 rounded-lg">SCORE: {score}</span>
                    </div>

                    {/* 提示/錯誤次數警示條 */}
                    <div className="w-full flex gap-2 mb-3">
                        <div className={`flex-1 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-black border-2 transition-all ${hintCount === 0 ? 'bg-slate-50 border-slate-200 text-slate-400' : hintCount === 1 ? 'bg-yellow-50 border-yellow-300 text-yellow-700' : hintCount === 2 ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-red-100 border-red-400 text-red-700'}`}>
                            <Lightbulb className="w-3.5 h-3.5" />
                            提示：{hintCount}/2
                            {hintCount >= 2 && <span className="ml-1 text-red-600">⚠ 不計分！</span>}
                        </div>
                        <div className={`flex-1 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-black border-2 transition-all ${errorCount === 0 ? 'bg-slate-50 border-slate-200 text-slate-400' : errorCount === 1 ? 'bg-yellow-50 border-yellow-300 text-yellow-700' : errorCount === 2 ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-red-100 border-red-400 text-red-700'}`}>
                            <XCircle className="w-3.5 h-3.5" />
                            錯誤：{errorCount}/3
                            {errorCount >= 3 && <span className="ml-1 text-red-600">⚠ 不計分！</span>}
                        </div>
                    </div>

                    <div className="bg-white border-4 border-b-8 border-violet-200 rounded-3xl p-8 mb-6 text-center w-full relative shadow-sm">
                        <div className="absolute top-3 left-1/2 -translate-x-1/2 bg-violet-100 text-violet-600 px-3 py-1 rounded-lg text-xs font-black uppercase tracking-wider">Listen & Spell</div>
                        <h2 className="font-black text-3xl text-slate-800 mt-4 mb-2">{currentItem.chinese}</h2>
                        <button onClick={() => speakText(currentItem.word)} className="p-4 bg-sky-100 text-sky-500 rounded-full hover:bg-sky-200 active:scale-95 transition-colors border-4 border-sky-200"><Volume2 className="w-8 h-8" /></button>
                        <p className="mt-2 text-slate-400 text-xs font-bold">點擊喇叭聽發音</p>
                    </div>

                    <div className="relative flex flex-wrap justify-center items-end gap-2 min-h-[80px] mb-6 p-4 bg-slate-200 rounded-3xl w-full border-inner border-4 border-slate-300">
                        {targetPattern.map((char, idx) => {
                            if (/[a-z]/.test(char)) {
                                const filledLetter = currentLetters[letterIndex];
                                letterIndex++;
                                return filledLetter
                                    ? (<button key={`filled-${idx}`} onClick={() => handleAnswerClick(filledLetter)} disabled={frozen} className={`w-10 h-12 text-white rounded-lg font-black text-2xl shadow-[0_4px_0_rgb(55,48,163)] active:translate-y-1 active:shadow-none transition-all pop-in mx-[1px] ${frozen ? 'bg-indigo-400 opacity-80 cursor-default' : 'bg-indigo-500'}`}>{filledLetter.char}</button>)

                    {/* 特殊回饋訊息區 */}

                    {feedback === 'no_score_solved' && (

                    {feedback === 'correct' && (

                    {feedback === 'wrong' && (

        };

        // --- 新增: Scramble Container (負責切換單字與文法重組) ---
        const ScrambleContainer = ({ scrambles, fullUnitData }) => {
            const [mode, setMode] = useState('vocab');

            const enrichVocabScrambles = () => {

                    </div>

        };

        // --- 元件 3: 重組句子模式 (積木風格) ---
        const ScrambleMode = ({ data, titleOverride }) => {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [userSentence, setUserSentence] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [showGiveUpConfirm, setShowGiveUpConfirm] = useState(false);
            const [showHelperHint, setShowHelperHint] = useState(false);
            const [magicCount, setMagicCount] = useState(0);
            const [gaveUp, setGaveUp] = useState(false);
            useEffect(() => { resetGame(); }, [data]);
            const resetGame = () => { if (!data || data.length === 0) return; const count = 5; const shuffledQuestions = shuffleArray([...data]).slice(0, count); setQuestions(shuffledQuestions); setCurrentIndex(0); setScore(0); setShowResult(false); if (shuffledQuestions.length > 0) loadQuestion(shuffledQuestions[0]); };
            const loadQuestion = (question) => { if (!question) return; const rawSentence = question.sentence; const spacedSentence = rawSentence.replace(/([.!?])$/, ' $1'); const words = spacedSentence.split(' '); const wordsWithIds = words.map((word, index) => ({ id: `${index}-${word}`, text: word })); setAvailableWords(shuffleArray(wordsWithIds)); setUserSentence([]); setFeedback(null); setShowGiveUpConfirm(false); setShowHelperHint(false); setMagicCount(0); setGaveUp(false); };
            const handleSkipQuestion = () => { if (questions.length <= 1) return; const currentQuestionIds = questions.map(q => q.id); const candidates = data.filter(item => !currentQuestionIds.includes(item.id)); let newQuestion; if (candidates.length > 0) { newQuestion = candidates[Math.floor(Math.random() * candidates.length)]; } else { const otherQuestions = data.filter(item => item.id !== questions[currentIndex].id); newQuestion = otherQuestions[Math.floor(Math.random() * otherQuestions.length)]; } const newQuestions = [...questions]; newQuestions[currentIndex] = newQuestion; setQuestions(newQuestions); loadQuestion(newQuestion); };
            const handleWordClick = (wordObj) => { if (feedback === 'correct') return; if (feedback === 'wrong') setFeedback(null); setAvailableWords(prev => prev.filter(w => w.id !== wordObj.id)); setUserSentence(prev => [...prev, wordObj]); };
            const handleAnswerClick = (wordObj) => { if (feedback === 'correct') return; if (feedback === 'wrong') setFeedback(null); setUserSentence(prev => prev.filter(w => w.id !== wordObj.id)); setAvailableWords(prev => [...prev, wordObj]); };
            const handleTryAgain = () => { setFeedback(null); setShowHelperHint(true); setTimeout(() => setShowHelperHint(false), 5000); };
            const handleMagicHint = () => {
                if (feedback === 'correct') return; setFeedback(null); setMagicCount(prev => prev + 1);
                let firstWrongIndex = -1; for (let i = 0; i < userSentence.length; i++) { if (userSentence[i].id.split('-')[0] !== String(i)) { firstWrongIndex = i; break; } }
                if (firstWrongIndex === -1) firstWrongIndex = userSentence.length;
                const totalWords = userSentence.length + availableWords.length; if (firstWrongIndex >= totalWords) return;
                const allWords = [...userSentence, ...availableWords]; const nextWordObj = allWords.find(w => w.id.split('-')[0] === String(firstWrongIndex));
                if (nextWordObj) { const newCorrectUserSentence = [...userSentence.slice(0, firstWrongIndex), nextWordObj]; const newAvailableWords = allWords.filter(w => !newCorrectUserSentence.some(cw => cw.id === w.id)); setUserSentence(newCorrectUserSentence); setAvailableWords(newAvailableWords); speakText(nextWordObj.text); }
            };
            const handleGiveUpClick = () => { setFeedback(null); setShowGiveUpConfirm(true); };
            const confirmGiveUp = () => { const allWords = [...userSentence, ...availableWords]; allWords.sort((a, b) => { const indexA = parseInt(a.id.split('-')[0]); const indexB = parseInt(b.id.split('-')[0]); return indexA - indexB; }); setUserSentence(allWords); setAvailableWords([]); setGaveUp(true); setFeedback('correct'); setShowGiveUpConfirm(false); };
            const checkAnswer = () => { const currentQuestion = questions[currentIndex]; const targetSentence = currentQuestion.sentence.replace(/\s+([.!?])/g, '$1'); const userRawString = userSentence.map(w => w.text).join(' '); const userCleanString = userRawString.replace(/\s+([.!?])/g, '$1'); if (userCleanString === targetSentence) { if (feedback === 'correct') return; setFeedback('correct'); if (magicCount <= 2) { setScore(prev => { const currentTotal = questions.length; const ptsPerQ = 100 / currentTotal; const prevCorrect = Math.round(prev / ptsPerQ); return Math.round(((prevCorrect + 1) / currentTotal) * 100); }); } speakText(currentQuestion.sentence); } else { setFeedback('wrong'); speakText("Oops"); } };
            const nextQuestion = () => { if (currentIndex < questions.length - 1) { setCurrentIndex(prev => prev + 1); loadQuestion(questions[currentIndex + 1]); } else { setShowResult(true); } };
            if (!questions || questions.length === 0) return <div className="p-10 text-center font-bold text-slate-400">Loading or No Data...</div>;
            if (showResult) return (<div className="flex flex-col items-center justify-center h-full animate-in zoom-in py-10 relative overflow-hidden"><Star className="w-32 h-32 text-yellow-400 mb-6 fill-yellow-400 drop-shadow-[0_4px_0_rgba(234,179,8,1)] animate-bounce" /><h2 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">挑戰成功！</h2><div className="text-7xl font-black text-indigo-600 mb-8 drop-shadow-sm">{score} <span className="text-3xl text-slate-400">/ 100 分</span></div><GameButton onClick={resetGame} color="purple" className="w-64 py-4 text-xl"><RefreshCw className="w-6 h-6" /> 再玩一次</GameButton></div>);
            const currentQ = questions[currentIndex];
            return (
                <div className="flex flex-col h-full max-w-2xl mx-auto pb-24 relative">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-30"><div className="absolute top-10 left-10 text-yellow-300"><Star size={40} /></div><div className="absolute top-40 right-10 text-rose-300"><Puzzle size={50} /></div><div className="absolute bottom-20 left-20 text-sky-300"><Gamepad2 size={60} /></div></div>
                    {/* 魔法提示/查看答案警示條 */}
                    <div className="w-full flex gap-2 mb-4 z-10 relative">
                        <div className={`flex-1 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-black border-2 transition-all ${magicCount === 0 ? 'bg-slate-50 border-slate-200 text-slate-400' : magicCount === 1 ? 'bg-yellow-50 border-yellow-300 text-yellow-700' : magicCount === 2 ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-red-100 border-red-400 text-red-700'}`}>
                            <Wand2 className="w-3.5 h-3.5" />
                            魔法提示：{magicCount}/2
                            {magicCount > 2 && <span className="ml-1 text-red-600">⚠ 不計分！</span>}
                        </div>
                        <div className={`flex-1 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-black border-2 transition-all ${gaveUp ? 'bg-red-100 border-red-400 text-red-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                            <Flag className="w-3.5 h-3.5" />
                            查看答案
                            {gaveUp && <span className="ml-1 text-red-600">⚠ 不計分！</span>}
                        </div>
                    </div>
                    <div className="bg-white border-4 border-b-8 border-orange-200 rounded-3xl p-6 mb-6 text-center relative z-10 shadow-sm">
                        <div className="flex justify-between items-center mb-2"><div className="inline-block bg-orange-100 text-orange-600 font-black px-3 py-1 rounded-lg text-xs border-2 border-orange-200">{titleOverride ? titleOverride : `LEVEL ${currentIndex + 1}`}</div>{currentQ?.word && <div className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">Target: {currentQ.word}</div>}</div>
                        <h2 className="font-black text-2xl text-slate-800 mb-4 leading-relaxed drop-shadow-sm">{currentQ?.sentence_chinese}</h2>
                        <p className="text-orange-500 text-sm font-bold bg-orange-50 px-4 py-1.5 rounded-full inline-block border-2 border-orange-100 animate-pulse">請用下方的積木拼出這句英文</p>
                    </div>
                    <div className="bg-slate-200/50 rounded-3xl shadow-inner border-4 border-slate-300 min-h-[160px] p-5 mb-6 flex flex-wrap content-center justify-center gap-3 relative transition-all z-10">
                        {userSentence.length === 0 && <div className="text-slate-400 font-black pointer-events-none flex flex-col items-center"><Puzzle className="w-10 h-10 mb-2 opacity-50" />請依序點擊下方的英文單字</div>}
                        {userSentence.map((wordObj) => (<button key={wordObj.id} onClick={() => handleAnswerClick(wordObj)} className="bg-indigo-500 text-white px-4 py-3 rounded-xl font-bold shadow-[0_4px_0_rgb(55,48,163)] active:shadow-none active:translate-y-1 transition-all border-2 border-indigo-400 text-lg animate-in zoom-in">{wordObj.text}</button>))}
                    </div>
                    <div className="h-20 mb-4 flex items-center justify-center gap-3 z-10 relative">
                        {feedback === 'correct' ? (<div className="w-full bg-emerald-100 border-4 border-emerald-300 text-emerald-700 px-6 py-4 rounded-3xl flex items-center justify-between shadow-lg animate-in slide-in-from-bottom-2"><div className="flex items-center gap-2 font-black text-xl"><CheckCircle className="w-8 h-8 text-emerald-500" /> CORRECT!</div><GameButton onClick={nextQuestion} color="green" className="text-sm">NEXT <ChevronRight className="w-4 h-4" /></GameButton></div>
                        ) : feedback === 'wrong' ? (<div className="w-full flex justify-center animate-in shake"><button onClick={handleTryAgain} className="bg-rose-500 text-white border-b-4 border-rose-700 active:border-b-0 active:translate-y-1 px-8 py-3 rounded-2xl font-black text-xl shadow-xl flex items-center gap-2 hover:bg-rose-600 transition-all w-full justify-center"><XCircle className="w-8 h-8" /> TRY AGAIN! (點擊重試)</button></div>
                        ) : (<><div className="flex gap-2 relative">{showHelperHint && <div className="absolute -top-20 left-0 bg-white border-4 border-sky-400 p-3 rounded-2xl w-48 shadow-xl z-50 animate-in fade-in slide-in-from-bottom-2"><p className="text-sky-600 text-xs font-black mb-1">💡 卡關了嗎？</p><p className="text-slate-600 text-xs font-bold">試試左邊的魔法棒或投降旗幟喔！</p><div className="absolute -bottom-3 left-6 w-4 h-4 bg-white border-b-4 border-r-4 border-sky-400 transform rotate-45"></div></div>}<GameButton onClick={handleSkipQuestion} color="purple" className="py-4" title="換一題"><Shuffle className="w-6 h-6" /></GameButton><GameButton onClick={handleMagicHint} color="yellow" className="py-4" title="提示下一個字"><Wand2 className="w-6 h-6" /></GameButton><GameButton onClick={handleGiveUpClick} color="red" className="py-4" title="查看答案"><Flag className="w-6 h-6" /></GameButton></div><GameButton onClick={checkAnswer} disabled={userSentence.length === 0} color="blue" className="flex-1 py-4 text-xl shadow-lg"><CheckCircle className="w-6 h-6" /> 檢查</GameButton></>)}
                    </div>
                    <div className="flex flex-wrap gap-2 justify-center z-10 relative pb-4">{availableWords.map((wordObj) => (<button key={wordObj.id} onClick={() => handleWordClick(wordObj)} className="bg-white text-slate-700 px-5 py-3 rounded-xl font-bold shadow-[0_4px_0_rgb(203,213,225)] active:shadow-none active:translate-y-1 transition-all border-2 border-slate-200 text-lg hover:border-indigo-300 hover:text-indigo-600">{wordObj.text}</button>))}</div>
                    {showGiveUpConfirm && (<div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm rounded-3xl animate-in fade-in"><div className="bg-white p-6 rounded-3xl border-4 border-slate-200 shadow-2xl max-w-xs text-center transform scale-100 animate-in zoom-in"><div className="flex justify-center mb-4"><AlertCircle className="w-16 h-16 text-yellow-400" /></div><h3 className="text-2xl font-black text-slate-800 mb-2">Wait!</h3><p className="text-slate-500 font-bold mb-6">真的不自己再試試看嗎？<br />自己拼出來會很有成就感喔！</p><div className="flex gap-3 justify-center"><GameButton onClick={() => setShowGiveUpConfirm(false)} color="blue" className="text-sm">再試一次</GameButton><GameButton onClick={confirmGiveUp} color="gray" className="text-sm">我看答案</GameButton></div></div></div>)}
                </div>);
        };

        // --- 元件 2: 測驗模式 ---
        const QuizMode = ({ data, grammarData }) => {
            const [quizType, setQuizType] = useState('choice');
            const [status, setStatus] = useState('menu');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [quizData, setQuizData] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [spellingData, setSpellingData] = useState([]);
            const [timeLeft, setTimeLeft] = useState(7);
            const [history, setHistory] = useState([]);
            const [spellingHistory, setSpellingHistory] = useState([]);

            const startChoiceQuiz = () => {
                if (!data || data.length === 0) return;
                const allVocabQuestions = [];
                data.forEach(target => {
                    const distractors1 = shuffleArray(data.filter(w => w.id !== target.id)).slice(0, 3);
                    allVocabQuestions.push({ questionText: target.word, correctId: target.id, correctAnswer: target.chinese, options: shuffleArray([target, ...distractors1]).map(o => ({ id: o.id, text: o.chinese, isCorrect: o.id === target.id })), hint: "請選出中文意思", audio: target.word });
                    const distractors2 = shuffleArray(data.filter(w => w.id !== target.id)).slice(0, 3);
                    allVocabQuestions.push({ questionText: target.chinese, correctId: target.id, correctAnswer: target.word, options: shuffleArray([target, ...distractors2]).map(o => ({ id: o.id, text: o.word, isCorrect: o.id === target.id })), hint: "請選出英文單字", audio: target.word });
                });
                const selectedQuestions = shuffleArray(allVocabQuestions).slice(0, 10);
                setQuizData(selectedQuestions); setCurrentQIndex(0); setScore(0); setHistory([]); setSelectedOption(null); setQuizType('choice'); setStatus('playing'); setTimeLeft(7);
            };
            const startSpellingQuiz = (type) => { let filteredData = []; if (!data) return; if (type === 'words') { filteredData = data.filter(item => item.part_of_speech !== 'phr.'); } else if (type === 'phrases') { filteredData = data.filter(item => item.part_of_speech === 'phr.'); } if (filteredData.length === 0) { alert("這個單元沒有這類型的題目喔！"); return; } setSpellingData(filteredData); setQuizType('spelling'); setStatus('playing'); };
            const handleOptionClick = (option) => { if (selectedOption) return; let points = 0; if (option.isCorrect) { points = Math.ceil((timeLeft / 7.0) * 100); if (points <= 0 && timeLeft > 0) points = 10; } const currentQ = quizData[currentQIndex]; setHistory(prev => [...prev, { q: currentQ.questionText, correct: currentQ.correctAnswer, user: option.text, isCorrect: option.isCorrect, points: points }]); setSelectedOption(option); if (currentQ.audio) speakText(currentQ.audio); if (option.isCorrect) { setScore(prev => prev + points); } };
            const nextQuestion = () => { if (currentQIndex < quizData.length - 1) { setCurrentQIndex(prev => prev + 1); setSelectedOption(null); setTimeLeft(7); } else { setStatus('result'); } };

            useEffect(() => {
                if (status !== 'playing' || quizType !== 'choice' || selectedOption) return;
                if (timeLeft <= 0) { const currentQ = quizData[currentQIndex]; setHistory(prev => [...prev, { q: currentQ.questionText, correct: currentQ.correctAnswer, user: "(逾時)", isCorrect: false, points: 0 }]); setSelectedOption({ id: 'timeout' }); speakText("Time's up"); return; }
                const timer = setInterval(() => { setTimeLeft(prev => prev - 1); }, 1000);
                return () => clearInterval(timer);
            }, [timeLeft, status, quizType, selectedOption]);

            const hasPhrases = data ? data.some(item => item.part_of_speech === 'phr.') : false;
            const hasWords = data ? data.some(item => item.part_of_speech !== 'phr.') : false;

            if (status === 'menu') {
                return (
                    <div className="flex flex-col items-center justify-center h-full animate-in fade-in space-y-4 pt-4 overflow-y-auto">
                        <div className="text-center mb-2"><Gamepad2 className="w-16 h-16 mx-auto text-sky-400 mb-2" /><h2 className="text-2xl font-black text-slate-700">選擇測驗模式</h2></div>
                        <button onClick={startChoiceQuiz} className="w-full max-w-xs bg-white border-4 border-slate-200 p-5 rounded-3xl hover:border-sky-400 group transition-all shadow-sm hover:shadow-md text-left relative overflow-hidden"><div className="absolute right-[-20px] top-[-20px] bg-sky-100 w-24 h-24 rounded-full group-hover:scale-150 transition-transform duration-500"></div><div className="relative z-10 flex items-center gap-4"><div className="bg-sky-500 text-white p-3 rounded-2xl"><MousePointerClick className="w-6 h-6" /></div><div><h3 className="text-lg font-black text-slate-800">選擇題大挑戰</h3><p className="text-xs text-slate-500 font-bold">10題 限時搶答 (每題7秒)</p></div></div></button>
                        <div className="w-full max-w-xs space-y-3">
                            <div className="text-slate-400 text-xs font-black uppercase tracking-wider pl-2">Spelling Mode</div>
                            {hasWords && (<button onClick={() => startSpellingQuiz('words')} className="w-full bg-white border-4 border-slate-200 p-4 rounded-3xl hover:border-violet-400 group transition-all shadow-sm hover:shadow-md text-left relative overflow-hidden"><div className="absolute right-[-20px] top-[-20px] bg-violet-100 w-20 h-20 rounded-full group-hover:scale-150 transition-transform duration-500"></div><div className="relative z-10 flex items-center gap-3"><div className="bg-violet-500 text-white p-2.5 rounded-2xl"><Keyboard className="w-5 h-5" /></div><div><h3 className="text-lg font-black text-slate-800">拼字：單字篇</h3><p className="text-xs text-slate-500 font-bold">Vocabulary Only</p></div></div></button>)}
                            {hasPhrases && (<button onClick={() => startSpellingQuiz('phrases')} className="w-full bg-white border-4 border-slate-200 p-4 rounded-3xl hover:border-pink-400 group transition-all shadow-sm hover:shadow-md text-left relative overflow-hidden"><div className="absolute right-[-20px] top-[-20px] bg-pink-100 w-20 h-20 rounded-full group-hover:scale-150 transition-transform duration-500"></div><div className="relative z-10 flex items-center gap-3"><div className="bg-pink-500 text-white p-2.5 rounded-2xl"><Filter className="w-5 h-5" /></div><div><h3 className="text-lg font-black text-slate-800">拼字：片語篇</h3><p className="text-xs text-slate-500 font-bold">Phrases & Idioms</p></div></div></button>)}
                        </div>
                    </div>
                );
            }
            if (status === 'result') {
                const maxScore = quizType === 'spelling' ? 100 : 1000;
                let feedbackTitle = ""; let feedbackColor = "";
                const pct = score / maxScore;
                if (pct >= 0.9) { feedbackTitle = "完美！🏆"; feedbackColor = "text-yellow-500"; }
                else if (pct >= 0.8) { feedbackTitle = "不錯！👍"; feedbackColor = "text-emerald-500"; }
                else if (pct >= 0.6) { feedbackTitle = "還可以 💪"; feedbackColor = "text-sky-500"; }
                else { feedbackTitle = "加油加油！再試一次！"; feedbackColor = "text-slate-500"; }

                const reasonLabel = (reason) => {
                    if (reason === 'hints') return { text: '提示超過2次', color: 'bg-orange-100 text-orange-700 border-orange-300' };
                    if (reason === 'solved') return { text: '直接看解答', color: 'bg-purple-100 text-purple-700 border-purple-300' };

                            <div className="text-6xl font-black text-slate-800 mb-2">{score} <span className="text-xl text-slate-400">/ {maxScore} 分</span></div>
                        </div>

                        {/* 選擇題結果 */}
                        {quizType === 'choice' && history.length > 0 && (
                            <div className="bg-white rounded-2xl shadow-sm border-2 border-slate-200 overflow-hidden mx-1 mb-6">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-500 uppercase bg-slate-100 border-b border-slate-200">
                                        <tr><th className="px-3 py-3 w-10">#</th><th className="px-3 py-3">題目</th><th className="px-3 py-3 text-center">得分</th></tr>
                                    </thead>
                                    <tbody>
                                        {history.map((record, idx) => (
                                            <tr key={idx} className={`border-b border-slate-100 last:border-0 ${record.isCorrect ? 'bg-emerald-50/40' : 'bg-rose-50/40'}`}>
                                                <td className="px-3 py-3 font-bold text-slate-400">{idx + 1}</td>
                                                <td className="px-3 py-3">
                                                    <div className="font-bold text-slate-700">{record.q}</div>
                                                    <div className="flex flex-col text-xs mt-1 gap-0.5">
                                                        <div className={record.isCorrect ? "text-emerald-600 font-bold" : "text-rose-500 font-bold"}>
                                                            {record.isCorrect ? "✅ 你答對了" : `❌ 您選: ${record.user}`}
                                                        </div>
                                                        {!record.isCorrect && (<div className="text-emerald-600 font-bold">✅ 正解: {record.correct}</div>)}
                                                    </div>
                                                </td>
                                                <td className="px-3 py-3 text-center font-black">{record.points > 0 ? <span className="text-emerald-500">+{record.points}</span> : <span className="text-slate-300">0</span>}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* 拼字測驗結果 */}
                        {quizType === 'spelling' && spellingHistory.length > 0 && (
                            <div className="space-y-2 mx-1 mb-6">
                                {spellingHistory.map((record, idx) => {
                                    const noScore = !record.scored;
                                    const tag = noScore ? reasonLabel(record.reason) : null;
                                    return (
                                        <div key={idx} className={`bg-white rounded-2xl border-l-8 px-4 py-3 shadow-sm flex items-center justify-between ${record.scored ? 'border-emerald-400' : 'border-rose-400'}`}>

                                                <span className="font-black text-slate-300 text-sm w-5">{idx + 1}</span>
                                                <div>
                                                    <div className="font-black text-lg text-slate-700">{record.word}</div>
                                                    {tag && <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ${tag.color}`}>{tag.text}</span>}
                                                </div>
                                            </div>
                                            <div className="font-black text-lg">
                                                {record.scored
                                                    ? <span className="text-emerald-500 flex items-center gap-1"><CheckCircle className="w-5 h-5" /> 正確</span>
                                                    : <span className="text-rose-400 flex items-center gap-1"><XCircle className="w-5 h-5" /> 錯誤</span>
                                                }
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        <div className="flex justify-center pb-8"><GameButton onClick={() => setStatus('menu')} color="green" className="w-64 text-xl py-4">回到選單</GameButton></div>
                    </div>

            if (quizType === 'spelling') return <SpellingQuiz data={spellingData} onFinish={(s, hist) => { setScore(s); setSpellingHistory(hist || []); setStatus('result'); }} />;
            const currentQ = quizData[currentQIndex];
            return (
                <div className="flex flex-col h-full max-w-md mx-auto">
                    <div className="mb-4 px-1 flex items-center justify-between"><div className="bg-white border-2 border-slate-200 px-3 py-1 rounded-full font-black text-slate-400 text-xs shadow-sm">STAGE {currentQIndex + 1} / {quizData.length}</div><div className="bg-yellow-100 border-2 border-yellow-300 px-3 py-1 rounded-full font-black text-yellow-700 text-xs shadow-sm">SCORE: {score}</div></div>
